<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Custom Journey Activity</title>

    <!-- jQuery + Postmonger -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="js/postmonger.js"></script>

    <style>
        body {
            font-family: "Salesforce Sans", Arial, sans-serif;
            padding: 20px;
            font-size: 14px;
        }

        h3 {
            margin-top: 0;
            color: #032d60;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #3e3e3c;
        }

        .form-control {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d8dde6;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: #1589ee;
            box-shadow: 0 0 3px rgba(21, 137, 238, 0.5);
        }

        button {
            padding: 8px 16px;
            background-color: #0070d2;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        #testResult {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>

<body>
    <h3>Send Data to Endpoint</h3>

    <!-- Endpoint URL -->
    <label for="endpointUrl">Endpoint URL:</label>
    <input type="text" id="endpointUrl" class="form-control"
        placeholder="https://your-api.com/receive">

    <br>

    <!-- Test Button -->
    <button id="testConnection">Test Connection</button>

    <!-- Result -->
    <div id="testResult"></div>

    <!-- Script -->
    <script src="js/test.js"></script>
</body>
</html>
